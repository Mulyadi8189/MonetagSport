<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="monetag" content="7a8c8b4c6693100e1653fae93cda8fb6">
    <title>Halaman Sederhana</title>
    <style>
        /* Gaya tampilan agar rapi dan berada di tengah halaman */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 100px 20px;
            background-color: #f8f9fa;
            color: #333;
        }

        /* Gaya untuk Headline */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Gaya untuk Tombol Hyperlink */
        .tombol-link {
            display: inline-block;
            padding: 12px 30px;
            font-size: 1rem;
            color: #ffffff;
            background-color: #007bff; /* Warna biru */
            text-decoration: none; /* Menghilangkan garis bawah link */
            border-radius: 5px; /* Membuat sudut tombol melengkung */
            font-weight: bold;
            transition: background-color 0.2s;
        }

        /* Efek saat tombol diarahkan oleh mouse (hover) */
        .tombol-link:hover {
            background-color: #0056b3; /* Warna biru lebih gelap */
        }
    </style>
</head>
<body>

    <!-- 1. Headline Utama -->
    <h1>Monetag Sport</h1>

    <!-- 2. Tombol Hyperlink -->
    <!-- Ganti "https://www.google.com" dengan link tujuanmu, dan ubah teks tombolnya -->
    <a href="https://omg10.com/4/11348917" target="_blank" class="tombol-link">Play Now</a>

</body>
</html>
